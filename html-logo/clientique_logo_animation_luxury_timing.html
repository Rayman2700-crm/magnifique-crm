<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIENTIQUE Logo Animation – Luxury Timing</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000000;
      --stage-scale: 0.45;
      --stage-scale-mobile: 0.28;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform: scale(var(--stage-scale));
      transform-origin: center;
      overflow: hidden;
      background: transparent;
    }

    .rings,
    .text,
    .line {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Kreise: ruhigerer, luxuriöser Start */
    .rings {
      opacity: 0.14;
      animation: ringsReveal 1180ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    /* Text: weich und elegant, leicht verzögert */
    .text {
      opacity: 0;
      transform: scale(0.992);
      transform-origin: center;
      animation: textReveal 920ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
      animation-delay: 260ms;
    }

    /* Linie: spät und souverän */
    .lineWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .line {
      opacity: 0;
      transform: scaleX(0);
      transform-origin: center;
      animation: lineDraw 520ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
      animation-delay: 980ms;
    }

    @keyframes ringsReveal {
      0% {
        opacity: 0.14;
        filter: blur(2px);
      }
      40% {
        opacity: 0.5;
        filter: blur(1px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes textReveal {
      0% {
        opacity: 0;
        transform: scale(0.992);
        filter: blur(2px);
      }
      55% {
        opacity: 0.7;
        transform: scale(0.997);
        filter: blur(0.8px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes lineDraw {
      0% {
        opacity: 0;
        transform: scaleX(0);
      }
      35% {
        opacity: 0.45;
      }
      100% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @media (max-width: 1200px) {
      .stage {
        transform: scale(var(--stage-scale-mobile));
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="rings" src="rings.png" alt="" />
    <img class="text" src="text.png" alt="CLIENTIQUE Digital Solutions" />
    <div class="lineWrap">
      <img class="line" src="line.png" alt="" />
    </div>
  </div>
</body>
</html>
