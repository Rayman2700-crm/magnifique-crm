<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIENTIQUE Logo Animation</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000000;
      --stage-scale: 0.45;
      --stage-scale-mobile: 0.28;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform: scale(var(--stage-scale));
      transform-origin: center;
      overflow: hidden;
      background: transparent;
    }

    .rings,
    .text,
    .line {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .rings {
      opacity: 0.22;
      animation: ringsReveal 760ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .text {
      opacity: 0;
      transform: scale(0.985);
      transform-origin: center;
      animation: textReveal 560ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 180ms;
    }

    .lineWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .line {
      opacity: 0;
      transform: scaleX(0);
      transform-origin: center;
      animation: lineDraw 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 620ms;
    }

    @keyframes ringsReveal {
      from {
        opacity: 0.22;
        filter: blur(1.4px);
      }
      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes textReveal {
      0% {
        opacity: 0;
        transform: scale(0.985);
        filter: blur(1.2px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes lineDraw {
      0% {
        opacity: 0;
        transform: scaleX(0);
      }
      100% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @media (max-width: 1200px) {
      .stage {
        transform: scale(var(--stage-scale-mobile));
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="rings" src="rings.png" alt="" />
    <img class="text" src="text.png" alt="CLIENTIQUE Digital Solutions" />
    <div class="lineWrap">
      <img class="line" src="line.png" alt="" />
    </div>
  </div>
</body>
</html>
