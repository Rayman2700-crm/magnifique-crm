<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIENTIQUE Logo Animation</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform: scale(0.45);
      transform-origin: center;
      overflow: hidden;
      background: transparent;
    }

    .rings,
    .text,
    .line {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .rings {
      opacity: 0.28;
      animation: ringsReveal 700ms ease-out forwards;
    }

    .text {
      opacity: 0;
      transform: scale(1.15);
      transform-origin: center;
      animation: textReveal 700ms ease-out forwards;
      animation-delay: 250ms;
    }

    .lineWrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform-origin: left center;
    }

    .line {
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left center;
      animation: lineDraw 320ms ease-out forwards;
      animation-delay: 700ms;
    }

    @keyframes ringsReveal {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    @keyframes textReveal {
      0% {
        opacity: 0;
        transform: scale(1.15);
        filter: blur(1.5px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes lineDraw {
      0% {
        opacity: 0;
        transform: scaleX(0);
      }
      100% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @media (max-width: 1200px) {
      .stage {
        transform: scale(0.28);
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="rings" src="rings.png" alt="" />
    <img class="text" src="text.png" alt="CLIENTIQUE Digital Solutions" />
    <div class="lineWrap">
      <img class="line" src="line.png" alt="" />
    </div>
  </div>
</body>
</html>
